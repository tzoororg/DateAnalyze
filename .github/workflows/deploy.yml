name: Deploy Pages (master + beta)

on:
  push:
    branches: [master, dev]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  deploy:
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - uses: actions/checkout@v4
        with:
          ref: master
          path: master
      - uses: actions/checkout@v4
        with:
          ref: dev
          path: dev
      - name: Assemble site (master at root, dev at /beta/)
        run: |
          mkdir site
          rsync -a --exclude .git master/ site/
          rsync -a --exclude .git dev/ site/beta/
          # Beta identity: separate app name + icon tint so it installs as a second PWA
          sed -i 's/"Us — Date Tracker"/"Us β — Demo"/; s/"Us ♥"/"Us β"/; s/"us-date-tracker"/"us-date-tracker-beta"/' site/beta/manifest.webmanifest
          sed -i 's/#e0567a/#2fbf8f/; s/#9b6cf0/#1f8ac0/' site/beta/icons/icon.svg site/beta/icons/icon-maskable.svg
          # Cache Storage is origin-wide: prefix beta's SW cache so the two apps never clash
          sed -i 's/"us-date-tracker-v/"beta-us-date-tracker-v/' site/beta/sw.js
      - uses: actions/upload-pages-artifact@v3
        with:
          path: site
      - id: deployment
        uses: actions/deploy-pages@v4
