name: Feedback → plan

# When a "feedback" issue is opened (or the label is added), generate a technical
# rewording + execution plan with the Claude API and post it as a comment.
on:
  issues:
    types: [opened, labeled]

permissions:
  issues: write

jobs:
  plan:
    # Only run for issues carrying the "feedback" label.
    if: contains(join(github.event.issue.labels.*.name, ','), 'feedback')
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Generate and post plan
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          GH_TOKEN: ${{ github.token }}
          ISSUE_NUMBER: ${{ github.event.issue.number }}
          ISSUE_TITLE: ${{ github.event.issue.title }}
          ISSUE_BODY: ${{ github.event.issue.body }}
        run: python .github/scripts/generate_plan.py
