name: Feedback → plan

# When YOU add the "plan" label to an issue, generate a technical rewording +
# execution plan with the Claude API and post it as a comment. Gating on a manual
# label (rather than firing on every opened feedback issue) means the paid API call
# only happens for items you choose to plan — strangers submitting feedback create a
# free GitHub issue but cannot trigger any API cost.
on:
  issues:
    types: [labeled]

permissions:
  issues: write

jobs:
  plan:
    # Only run when the label that was just added is "plan".
    if: github.event.label.name == 'plan'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Generate and post plan
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          GH_TOKEN: ${{ github.token }}
          ISSUE_NUMBER: ${{ github.event.issue.number }}
          ISSUE_TITLE: ${{ github.event.issue.title }}
          ISSUE_BODY: ${{ github.event.issue.body }}
        run: python .github/scripts/generate_plan.py
